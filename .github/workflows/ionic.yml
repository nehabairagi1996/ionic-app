name: Ionic CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # ✅ Setup Node first
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      # ✅ Setup Java BEFORE any Android/Gradle step
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Verify Java
      - name: Check Java version
        run: java -version

      # Install dependencies
      - run: npm install

      # Build web app
      - run: npm run build

      # Install Ionic CLI
      - run: npm install -g @ionic/cli

      # Build Ionic app
      - run: ionic build

      # Sync Capacitor
      - run: npx cap sync android

      # Build Android APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug