name: Ionic CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # ✅ Setup Node
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      # ✅ Setup Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # ✅ Verify Java
      - name: Check Java version
        run: java -version

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Install Ionic CLI
      - name: Install Ionic CLI
        run: npm install -g @ionic/cli

      # Build Ionic app
      - name: Build Web App
        run: ionic build

      # Sync Capacitor
      - name: Capacitor Sync
        run: npx cap sync android

      # Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ Upload APK (FIXED POSITION)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk